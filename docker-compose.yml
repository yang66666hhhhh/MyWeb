services:
  api:
    build:
      context: ./WebApplication1
      dockerfile: Dockerfile
    container_name: growth-api
    ports:
      - "5062:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - DB_CONNECTION=${DB_CONNECTION}
      - Jwt__SecretKey=${JWT_SECRET_KEY}
      - Jwt__Issuer=PersonalGrowthManagement
      - Jwt__Audience=VueVbenAdmin
      - Security__EncryptionKey=${SECURITY_ENCRYPTION_KEY}
      - OpenAI__ApiKey=${OPENAI_API_KEY:-}
      - Database__AutoMigrate=${DATABASE_AUTO_MIGRATE:-true}
      - Database__SeedOnStartup=${DATABASE_SEED_ON_STARTUP:-true}
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/healthz/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - growth-network
    restart: unless-stopped

  web:
    build:
      context: ./vue-vben-admin
      dockerfile: Dockerfile
    container_name: growth-web
    ports:
      - "5666:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    networks:
      - growth-network
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: growth-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-personal_growth}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - growth-network
    restart: unless-stopped

volumes:
  mysql-data:

networks:
  growth-network:
    driver: bridge
